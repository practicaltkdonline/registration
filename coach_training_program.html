<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教練培訓班(2026年第二期)報名表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #e6f0fa 0%, #f5f5f5 100%);
      color: #2d3748;
    }
    .form-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      margin-bottom: 40px;
    }
    .form-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .form-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a4971;
      margin-bottom: 12px;
    }
    .form-header p {
      font-size: 16px;
      color: #4a5568;
      line-height: 1.6;
      max-width: 600px;
      margin: 8px auto;
    }
    .form-group {
      margin-bottom: 28px;
    }
    label {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 16px;
      color: #2d3748;
    }
    label::before {
      content: '*';
      color: #e53e3e;
      margin-right: 6px;
      font-size: 16px;
      display: inline-block;
    }
    label.no-asterisk::before {
      content: none;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 8px rgba(49, 130, 206, 0.3);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 12px;
      background: #f7fafc;
      border-radius: 8px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      font-size: 16px;
      margin-bottom: 0;
    }
    .checkbox-group input[type="checkbox"],
    .checkbox-group input[type="radio"] {
      width: auto;
      margin-right: 12px;
      accent-color: #3182ce;
    }
    .error {
      color: #e53e3e;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    #customDojo {
      margin-top: 12px;
    }
    #thankYouPage {
      display: none;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    #thankYouPage h2 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #1a4971;
    }
    #thankYouPage p {
      font-size: 16px;
      margin: 8px 0;
      color: #2d3748;
      line-height: 1.6;
    }
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    }
    button[type="submit"], button.return-button {
      background-color: #3182ce;
      color: white;
    }
    button[type="submit"]:hover, button.return-button:hover {
      background-color: #2b6cb0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(49, 130, 206, 0.4);
    }
    @media (max-width: 600px) {
      .form-container, #thankYouPage {
        padding: 24px;
      }
      .form-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container" id="formContainer">
    <div class="form-header">
      <h1>教練培訓班(2026年第二期)報名表</h1>
      <p>歡迎各位報名參加教練培訓班（2026年第二期）！</p>
      <p>本表單旨在收集您的基本資訊及學習需求，以便我們設計更符合需求的課程內容。</p>
    </div>
    <form id="registrationForm">
      <!-- 1. 姓名 -->
      <div class="form-group">
        <label for="name">姓名</label>
        <input type="text" id="name" name="entry.214935030" required>
        <span id="nameError" class="error">請輸入姓名</span>
      </div>

      <!-- 2. 所屬道場 -->
      <div class="form-group">
        <label class="no-asterisk">所屬道場（可多選）</label>
        <div class="checkbox-group" id="dojoGroup">
          <label class="no-asterisk"><input type="checkbox" value="觀塘"> 觀塘</label>
          <label class="no-asterisk"><input type="checkbox" value="九龍灣"> 九龍灣</label>
          <label class="no-asterisk"><input type="checkbox" value="炮台山"> 炮台山</label>
          <label class="no-asterisk"><input type="checkbox" value="筲箕灣"> 筲箕灣</label>
          <label class="no-asterisk"><input type="checkbox" value="長沙灣"> 長沙灣</label>
          <label class="no-asterisk"><input type="checkbox" value="元朗"> 元朗</label>
          <label class="no-asterisk"><input type="checkbox" value="紅磡"> 紅磡</label>
          <label class="no-asterisk"><input type="checkbox" value="柴灣"> 柴灣</label>
          <label class="no-asterisk"><input type="checkbox" value="荔枝角"> 荔枝角</label>
          <label class="no-asterisk"><input type="checkbox" value="鰂魚涌"> 鰂魚涌</label>
          <label class="no-asterisk"><input type="checkbox" value="其他"> 其他（請手動輸入）</label>
        </div>
        <input type="text" id="customDojo" placeholder="請輸入道場名稱" style="display: none;">
        <input type="hidden" id="dojo" name="entry.1854538383">
        <span id="dojoError" class="error">請至少選擇一項道場</span>
      </div>

      <!-- 3. 踢腳動作 -->
      <div class="form-group">
        <label for="kicking">那些踢腳動作想於教練班中學習？</label>
        <textarea id="kicking" name="entry.991224280" placeholder="例如：後踢、旋踢、跳踢等" required></textarea>
        <span id="kickingError" class="error">請填寫您想學習的踢腳動作</span>
      </div>

      <!-- 4. 搏擊技術 -->
      <div class="form-group">
        <label for="fightingTech">什麼搏擊技術想於教練班中學習？</label>
        <textarea id="fightingTech" name="entry.1515933178" placeholder="例如：步法、防守反擊等" required></textarea>
        <span id="fightingTechError" class="error">請填寫您想學習的搏擊技術</span>
      </div>

      <!-- 5. 品勢 -->
      <div class="form-group">
        <label for="poomsae">那一套品勢最想於教練班中學習到？</label>
        <textarea id="poomsae" name="entry.100433372" placeholder="例如：太極一章、高麗等" required></textarea>
        <span id="poomsaeError" class="error">請填寫您最想學習的品勢</span>
      </div>

      <!-- 6. 近期困難 -->
      <div class="form-group">
        <label for="recentDifficulties">描述一下近期教學上遇到的困難是什麼？</label>
        <textarea id="recentDifficulties" name="entry.1952138955" required></textarea>
        <span id="recentDifficultiesError" class="error">請輸入您的描述</span>
      </div>

      <!-- 7. 如何解決 -->
      <div class="form-group">
        <label for="solution">你如何解決？</label>
        <textarea id="solution" name="entry.597453107" required></textarea>
        <span id="solutionError" class="error">請輸入您的解決方法</span>
      </div>

      <!-- 8. 是否出席（已修正） -->
      <div class="form-group">
        <label class="no-asterisk">會否出席今期教練培訓班？</label>
        <div class="checkbox-group">
          <label class="no-asterisk"><input type="radio" name="attend" value="是" onchange="updateAttend()"> 是</label>
          <label class="no-asterisk"><input type="radio" name="attend" value="否" onchange="updateAttend()"> 否</label>
        </div>
        <input type="hidden" id="attend" name="entry.673172076">
        <span id="attendError" class="error">請選擇是否出席</span>
      </div>

      <button type="submit">提交表單</button>
    </form>
  </div>

  <div id="thankYouPage">
    <h2>感謝您的回覆！</h2>
    <p id="thankYouMessage1"></p>
    <p id="thankYouMessage2"></p>
    <button class="return-button" onclick="restartForm()">重新填寫</button>
  </div>

  <script>
    // 道場多選
    const customDojoInput = document.getElementById('customDojo');
    const dojoHidden = document.getElementById('dojo');

    function toggleCustomDojo() {
      const otherCheckbox = document.querySelector('#dojoGroup input[value="其他"]');
      if (otherCheckbox && otherCheckbox.checked) {
        customDojoInput.style.display = 'block';
        customDojoInput.focus();
      } else {
        customDojoInput.style.display = 'none';
        customDojoInput.value = '';
      }
      updateDojo();
    }

    function updateDojo() {
      const checkboxes = document.querySelectorAll('#dojoGroup input[type="checkbox"]');
      const selected = [];
      checkboxes.forEach(cb => {
        if (cb.checked) {
          if (cb.value !== '其他') selected.push(cb.value);
          else if (customDojoInput.value.trim()) selected.push(customDojoInput.value.trim());
        }
      });
      dojoHidden.value = selected.join(', ');
    }

    // 是否出席
    function updateAttend() {
      const selected = document.querySelector('input[name="attend"]:checked');
      document.getElementById('attend').value = selected ? selected.value : '';
    }

    // 事件綁定
    document.querySelectorAll('#dojoGroup input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        toggleCustomDojo();
        updateDojo();
      });
    });
    customDojoInput.addEventListener('input', updateDojo);

    // 表單提交驗證
    const form = document.getElementById('registrationForm');
    const formContainer = document.getElementById('formContainer');
    const thankYouPage = document.getElementById('thankYouPage');
    const thankYouMessage1 = document.getElementById('thankYouMessage1');
    const thankYouMessage2 = document.getElementById('thankYouMessage2');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let isValid = true;

      document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

      if (!document.getElementById('name').value.trim()) { document.getElementById('nameError').style.display = 'block'; isValid = false; }
      if (!dojoHidden.value.trim()) { document.getElementById('dojoError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('kicking').value.trim()) { document.getElementById('kickingError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('fightingTech').value.trim()) { document.getElementById('fightingTechError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('poomsae').value.trim()) { document.getElementById('poomsaeError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('recentDifficulties').value.trim()) { document.getElementById('recentDifficultiesError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('solution').value.trim()) { document.getElementById('solutionError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('attend').value.trim()) { document.getElementById('attendError').style.display = 'block'; isValid = false; }

      if (isValid) {
        const attendVal = document.getElementById('attend').value;
        if (attendVal === '是') {
          thankYouMessage1.textContent = '感謝您報名參加教練培訓班（2026年第二期）！';
          thankYouMessage2.textContent = '您的學習需求將幫助我們設計更針對性的課程內容。';
        } else {
          thankYouMessage1.textContent = '感謝您的寶貴意見！';
          thankYouMessage2.textContent = '期待您下次有機會參加培訓課程。';
        }

        const formData = new FormData(form);
        try {
          await fetch('https://docs.google.com/forms/d/e/1FAIpQLScg7iC6ncaAHyo-HYsnM0WeBGVxp5zmqQkje-egHg6u5iDaKA/formResponse', {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
          });
          formContainer.style.display = 'none';
          thankYouPage.style.display = 'block';
        } catch (error) {
          alert('提交失敗，請稍後再試。');
        }
      }
    });

    function resetForm() {
      form.reset();
      document.querySelectorAll('.error').forEach(el => el.style.display = 'none');
      customDojoInput.style.display = 'none';
      document.getElementById('attend').value = '';
    }

    function restartForm() {
      thankYouPage.style.display = 'none';
      formContainer.style.display = 'block';
      resetForm();
    }
  </script>
</body>
</html>
