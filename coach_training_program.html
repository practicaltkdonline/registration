<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教練培訓班(2026年第三堂)報名表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #e6f0fa 0%, #f5f5f5 100%);
      color: #2d3748;
    }
    .form-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      margin-bottom: 40px;
    }
    .form-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .form-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a4971;
      margin-bottom: 12px;
    }
    .form-header p {
      font-size: 16px;
      color: #4a5568;
      line-height: 1.6;
      max-width: 600px;
      margin: 8px auto;
    }
    .progress-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
      height: 4px;
      background: #e2e8f0;
      z-index: 1;
    }
    .step {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #718096;
      z-index: 2;
      position: relative;
    }
    .step.active {
      background: #3182ce;
      color: white;
    }
    .step.completed {
      background: #48bb78;
      color: white;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .form-group {
      margin-bottom: 28px;
    }
    label {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 16px;
      color: #2d3748;
    }
    label::before {
      content: '*';
      color: #e53e3e;
      margin-right: 6px;
      font-size: 16px;
      display: inline-block;
    }
    label.no-asterisk::before {
      content: none;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 8px rgba(49, 130, 206, 0.3);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 12px;
      background: #f7fafc;
      border-radius: 8px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      font-size: 16px;
      margin-bottom: 0;
    }
    .checkbox-group input[type="checkbox"],
    .checkbox-group input[type="radio"] {
      width: auto;
      margin-right: 12px;
      accent-color: #3182ce;
    }
    .error {
      color: #e53e3e;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    #customDojo, #customDifficulty {
      margin-top: 12px;
    }
    .navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
    }
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    }
    button[type="button"] {
      background-color: #718096;
      color: white;
    }
    button[type="button"]:hover {
      background-color: #4a5568;
    }
    button[type="submit"], button.next-btn {
      background-color: #3182ce;
      color: white;
    }
    button[type="submit"]:hover, button.next-btn:hover {
      background-color: #2b6cb0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(49, 130, 206, 0.4);
    }
    #thankYouPage {
      display: none;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    #thankYouPage h2 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #1a4971;
    }
    #thankYouPage p {
      font-size: 16px;
      margin: 8px 0;
      color: #2d3748;
      line-height: 1.6;
    }
    @media (max-width: 600px) {
      .form-container, #thankYouPage {
        padding: 24px;
      }
      .form-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container" id="formContainer">
    <div class="form-header">
      <h1>教練培訓班(2026年第三堂)報名表</h1>
      <p>歡迎各位報名參加教練培訓班（2026年第三堂）！</p>
      <p>本表單旨在收集您的基本資訊及教學經驗，以便我們設計更符合需求的課程內容。</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar">
      <div class="step active" data-step="1">1</div>
      <div class="step" data-step="2">2</div>
      <div class="step" data-step="3">3</div>
      <div class="step" data-step="4">4</div>
    </div>

    <form id="registrationForm">
      <!-- Page 1: 個人資料 -->
      <div class="page active" id="page1">
        <div class="form-group">
          <label for="name">姓名</label>
          <input type="text" id="name" name="entry.214935030" required>
          <span id="nameError" class="error">請輸入姓名</span>
        </div>

        <div class="form-group">
          <label class="no-asterisk">所屬道場（可多選）</label>
          <div class="checkbox-group" id="dojoGroup">
            <label class="no-asterisk"><input type="checkbox" value="觀塘"> 觀塘</label>
            <label class="no-asterisk"><input type="checkbox" value="九龍灣"> 九龍灣</label>
            <label class="no-asterisk"><input type="checkbox" value="炮台山"> 炮台山</label>
            <label class="no-asterisk"><input type="checkbox" value="筲箕灣"> 筲箕灣</label>
            <label class="no-asterisk"><input type="checkbox" value="長沙灣"> 長沙灣</label>
            <label class="no-asterisk"><input type="checkbox" value="元朗"> 元朗</label>
            <label class="no-asterisk"><input type="checkbox" value="紅磡"> 紅磡</label>
            <label class="no-asterisk"><input type="checkbox" value="柴灣"> 柴灣</label>
            <label class="no-asterisk"><input type="checkbox" value="荔枝角"> 荔枝角</label>
            <label class="no-asterisk"><input type="checkbox" value="鰂魚涌"> 鰂魚涌</label>
            <label class="no-asterisk"><input type="checkbox" value="其他"> 其他（請手動輸入）</label>
          </div>
          <input type="text" id="customDojo" placeholder="請輸入道場名稱" style="display: none;">
          <input type="hidden" id="dojo" name="entry.1854538383">
          <span id="dojoError" class="error">請至少選擇一項道場</span>
        </div>

        <div class="navigation">
          <button type="button" onclick="prevPage()">上一步</button>
          <button type="button" class="next-btn" onclick="nextPage()">下一步</button>
        </div>
      </div>

      <!-- Page 2: 品勢知識測試 -->
      <div class="page" id="page2">
        <h2 style="margin-bottom: 24px; color: #1a4971;">品勢知識測試</h2>
        
        <div class="form-group"><label for="q1">1. 品勢比賽中的 6分及4分代表什麼？</label><textarea id="q1" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q2">2. 動作做錯會如何扣分？</label><textarea id="q2" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q3">3. 踢腳沒有看目標會如何扣分？</label><textarea id="q3" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q4">4. 同分如何分勝負？</label><textarea id="q4" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q5">5. 那幾套品勢有2下叫喊聲？</label><textarea id="q5" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q6">6. 弓步(大步)有幾步？</label><input type="text" id="q6" placeholder="請填寫答案" required></div>
        <div class="form-group"><label for="q7">7. 三七步(L stance)有幾步？</label><input type="text" id="q7" placeholder="請填寫答案" required></div>
        <div class="form-group"><label for="q8">8. 行步(細步)有幾步？</label><input type="text" id="q8" placeholder="請填寫答案" required></div>
        <div class="form-group"><label for="q9">9. 太極五章 side kick 前手要放那裏？</label><textarea id="q9" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q10">10. 太極七章的第15動作叫什麼名字？</label><textarea id="q10" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q11">11. 太極八章第1個及第2個 Double jump snap kick 分別踢幾高？</label><textarea id="q11" placeholder="請填寫答案" required></textarea></div>
        <div class="form-group"><label for="q12">12. 高麗 Double side kick 分別踢幾高？</label><textarea id="q12" placeholder="請填寫答案" required></textarea></div>

        <input type="hidden" id="combinedAnswers" name="entry.991224280">

        <div class="navigation">
          <button type="button" onclick="prevPage()">上一步</button>
          <button type="button" class="next-btn" onclick="nextPage()">下一步</button>
        </div>
      </div>

      <!-- Page 3: 教學困難 -->
      <div class="page" id="page3">
        <h2 style="margin-bottom: 24px; color: #1a4971;">教學經驗分享</h2>
        
        <div class="form-group">
          <label class="no-asterisk">1. 你在教品勢時，最常遇到的困難是什麼？（可複選）</label>
          <div class="checkbox-group" id="difficultyGroup">
            <label class="no-asterisk"><input type="checkbox" value="學生姿勢不標準"> 學生姿勢不標準</label>
            <label class="no-asterisk"><input type="checkbox" value="學生容易忘記動作順序"> 學生容易忘記動作順序</label>
            <label class="no-asterisk"><input type="checkbox" value="不同年齡/程度學生如何同時教學"> 不同年齡/程度學生如何同時教學</label>
            <label class="no-asterisk"><input type="checkbox" value="比賽如何準備"> 比賽如何準備</label>
            <label class="no-asterisk"><input type="checkbox" value="其他"> 其他（請說明）</label>
          </div>
          <input type="text" id="customDifficulty" placeholder="請說明其他困難" style="display: none;">
          <span id="difficultyError" class="error">請至少選擇一項</span>
        </div>

        <div class="form-group">
          <label for="recentDifficulties">2. 描述一下近期教學上遇到的困難是什麼？</label>
          <textarea id="recentDifficulties" name="entry.1850722189" placeholder="例如：小朋友唔聽話、家長很擔心等" required></textarea>
          <span id="recentDifficultiesError" class="error">請輸入您的描述</span>
        </div>

        <div class="form-group">
          <label for="solution">3. 你能否處理到呢？並且會如何解決？</label>
          <textarea id="solution" name="entry.2040322488" required></textarea>
          <span id="solutionError" class="error">請輸入您的解決方法</span>
        </div>

        <div class="navigation">
          <button type="button" onclick="prevPage()">上一步</button>
          <button type="button" class="next-btn" onclick="nextPage()">下一步</button>
        </div>
      </div>

      <!-- Page 4: 出席確認 -->
      <div class="page" id="page4">
        <div class="form-group">
          <label class="no-asterisk">4. 你會否出席第3堂培訓班？</label>
          <div class="checkbox-group">
            <label class="no-asterisk"><input type="radio" name="attend" value="是" onchange="updateAttend()"> 會</label>
            <label class="no-asterisk"><input type="radio" name="attend" value="否" onchange="updateAttend()"> 不會</label>
          </div>
          <input type="hidden" id="attend" name="entry.326286952">
          <span id="attendError" class="error">請選擇是否出席</span>
        </div>

        <div class="navigation">
          <button type="button" onclick="prevPage()">上一步</button>
          <button type="submit">提交表單</button>
        </div>
      </div>
    </form>
  </div>

  <div id="thankYouPage">
    <h2>感謝您的回覆！</h2>
    <p id="thankYouMessage1"></p>
    <p id="thankYouMessage2"></p>
    <button class="return-button" onclick="restartForm()">重新填寫</button>
  </div>

  <script>
    let currentPage = 1;
    const totalPages = 4;

    // 道場多選
    const customDojoInput = document.getElementById('customDojo');
    const dojoHidden = document.getElementById('dojo');

    function toggleCustomDojo() {
      const other = document.querySelector('#dojoGroup input[value="其他"]');
      if (other && other.checked) {
        customDojoInput.style.display = 'block';
      } else {
        customDojoInput.style.display = 'none';
        customDojoInput.value = '';
      }
      updateDojo();
    }

    function updateDojo() {
      const selected = Array.from(document.querySelectorAll('#dojoGroup input[type="checkbox"]:checked'))
        .map(cb => cb.value === '其他' ? customDojoInput.value.trim() : cb.value)
        .filter(Boolean);
      dojoHidden.value = selected.join(', ');
    }

    // 教學困難多選
    const customDifficultyInput = document.getElementById('customDifficulty');

    function toggleCustomDifficulty() {
      const other = document.querySelector('#difficultyGroup input[value="其他"]');
      if (other && other.checked) {
        customDifficultyInput.style.display = 'block';
      } else {
        customDifficultyInput.style.display = 'none';
        customDifficultyInput.value = '';
      }
    }

    // 合併所有答案（1-12題 + 教學困難）
    function combineAnswers() {
      const answers = [];
      
      // 品勢 1-12 題
      for (let i = 1; i <= 12; i++) {
        const field = document.getElementById(`q${i}`);
        if (field) answers.push(field.value.trim() || '未填寫');
      }
      
      // 教學困難多選
      const difficulties = Array.from(document.querySelectorAll('#difficultyGroup input[type="checkbox"]:checked'))
        .map(cb => cb.value === '其他' ? customDifficultyInput.value.trim() : cb.value)
        .filter(Boolean);
      answers.push(difficulties.length ? difficulties.join('、') : '未填寫');

      document.getElementById('combinedAnswers').value = answers.join('; ');
    }

    // 是否出席
    function updateAttend() {
      const selected = document.querySelector('input[name="attend"]:checked');
      document.getElementById('attend').value = selected ? selected.value : '';
    }

    // 分頁控制
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page${page}`).classList.add('active');
      currentPage = page;

      document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('active', 'completed');
        const n = parseInt(step.dataset.step);
        if (n < currentPage) step.classList.add('completed');
        if (n === currentPage) step.classList.add('active');
      });
    }

    function nextPage() { if (currentPage < totalPages) showPage(currentPage + 1); }
    function prevPage() { if (currentPage > 1) showPage(currentPage - 1); }

    // 事件綁定
    document.querySelectorAll('#dojoGroup input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => { toggleCustomDojo(); updateDojo(); });
    });
    customDojoInput.addEventListener('input', updateDojo);

    document.querySelectorAll('#difficultyGroup input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => { toggleCustomDifficulty(); });
    });
    customDifficultyInput.addEventListener('input', () => {});

    // 表單提交
    const form = document.getElementById('registrationForm');
    const formContainer = document.getElementById('formContainer');
    const thankYouPage = document.getElementById('thankYouPage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let isValid = true;
      document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

      // 驗證
      if (!document.getElementById('name').value.trim()) { document.getElementById('nameError').style.display = 'block'; isValid = false; }
      if (!dojoHidden.value.trim()) { document.getElementById('dojoError').style.display = 'block'; isValid = false; }

      for (let i = 1; i <= 12; i++) {
        const field = document.getElementById(`q${i}`);
        if (field && !field.value.trim()) {
          const err = document.createElement('span');
          err.className = 'error';
          err.style.display = 'block';
          err.textContent = '請填寫答案';
          field.parentNode.appendChild(err);
          isValid = false;
        }
      }

      if (!Array.from(document.querySelectorAll('#difficultyGroup input[type="checkbox"]:checked')).length) {
        document.getElementById('difficultyError').style.display = 'block'; isValid = false;
      }
      if (!document.getElementById('recentDifficulties').value.trim()) { document.getElementById('recentDifficultiesError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('solution').value.trim()) { document.getElementById('solutionError').style.display = 'block'; isValid = false; }
      if (!document.getElementById('attend').value.trim()) { document.getElementById('attendError').style.display = 'block'; isValid = false; }

      if (isValid) {
        combineAnswers();   // 合併答案

        const formData = new FormData(form);
        try {
          await fetch('https://docs.google.com/forms/d/e/1FAIpQLSd0BlN9foIHdzh7elx5xwVRfli8Hu-oKtEebMNW_1fsT_LfQg/formResponse', {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
          });

          formContainer.style.display = 'none';
          thankYouPage.style.display = 'block';
          document.getElementById('thankYouMessage1').textContent = '感謝您報名參加教練培訓班（2026年第三期）！';
          document.getElementById('thankYouMessage2').textContent = '您的回覆將幫助我們優化課程內容。';
        } catch (error) {
          alert('提交失敗，請稍後再試。');
        }
      } else {
        if (!document.getElementById('name').value.trim() || !dojoHidden.value.trim()) showPage(1);
        else if (Array.from(document.querySelectorAll('#page2 .error')).some(el => el.style.display === 'block')) showPage(2);
        else showPage(3);
      }
    });

    function restartForm() {
      thankYouPage.style.display = 'none';
      formContainer.style.display = 'block';
      form.reset();
      document.querySelectorAll('.error').forEach(el => el.style.display = 'none');
      customDojoInput.style.display = 'none';
      customDifficultyInput.style.display = 'none';
      showPage(1);
    }

    document.addEventListener('DOMContentLoaded', () => showPage(1));
  </script>
</body>
</html>
